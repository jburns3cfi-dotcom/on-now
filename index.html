<!DOCTYPE html>
<!-- tvguide index 2026-06-21 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#11151c">
<title>On Now</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11151c; --panel:#1a2029; --panel2:#202836; --line:#2b333f;
    --text:#e8ebef; --muted:#93a0b0; --amber:#e8a13a; --amber-dim:#7a5a23;
    --cyan:#4fd1c5; --bad:#e06b5e;
    --rail:64px;
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);
    font-family:Inter,system-ui,sans-serif;-webkit-text-size-adjust:100%}
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
  h1,h2,h3{font-family:"Bricolage Grotesque",Inter,sans-serif;margin:0}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}

  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--ink),rgba(17,21,28,.92));
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--amber);
    box-shadow:0 0 0 0 var(--amber);animation:pulse 2.4s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(232,161,58,.5)}70%{box-shadow:0 0 0 9px rgba(232,161,58,0)}100%{box-shadow:0 0 0 0 rgba(232,161,58,0)}}
  @media (prefers-reduced-motion:reduce){.brand .dot{animation:none}}
  h1{font-size:21px;letter-spacing:-.01em;font-weight:800}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .titlebar{display:flex;justify-content:space-between;align-items:flex-end}
  .toggle{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .toggle input{accent-color:var(--amber);width:16px;height:16px}

  main{padding:14px 14px 24px;max-width:680px;margin:0 auto}
  .view{display:none}
  .view.active{display:block;animation:fade .18s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){.view.active{animation:none}}

  /* channel / airing cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:10px;display:grid;grid-template-columns:var(--rail) 1fr;gap:12px}
  .rail{display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-right:1px solid var(--line);padding-right:10px;text-align:center}
  .chnum{font-family:"IBM Plex Mono",monospace;font-size:19px;font-weight:600;color:var(--amber)}
  .chname{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.1;word-break:break-word}
  .body .label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .body .show{font-size:16px;font-weight:600;line-height:1.2;margin:2px 0}
  .body .ep{font-size:12px;color:var(--muted);margin-bottom:6px}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .onair{display:inline-flex;align-items:center;gap:5px;background:var(--amber);color:#1a1206;
    font-weight:600;font-size:10px;letter-spacing:.06em;padding:2px 7px;border-radius:999px;text-transform:uppercase}
  .new{display:inline-flex;align-items:center;gap:4px;color:var(--cyan);border:1px solid var(--cyan);
    font-size:10px;font-weight:600;letter-spacing:.05em;padding:1px 6px;border-radius:999px;text-transform:uppercase}
  .progress{height:4px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--amber);border-radius:3px;transition:width .6s ease}
  .next{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);font-size:13px;color:var(--muted)}
  .next b{color:var(--text);font-weight:500}

  /* new feed + watchlist rows */
  .row{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
  .row .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .row .show{font-size:15px;font-weight:600}
  .row .when{font-size:13px;color:var(--text);margin-top:4px}
  .row .when.muted{color:var(--muted)}
  .row .when .where{color:var(--amber)}
  .chip-btn{flex:none;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);
    font-family:Inter;font-size:12px;font-weight:600;padding:6px 10px;border-radius:9px;cursor:pointer}
  .chip-btn:active{background:rgba(232,161,58,.12)}

  /* setup form */
  label.field{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px}
  input[type=text],input[type=number],textarea{width:100%;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);border-radius:10px;padding:11px 12px;font-family:Inter;font-size:15px}
  textarea{min-height:120px;resize:vertical;font-family:"IBM Plex Mono",monospace;font-size:13px;line-height:1.5}
  .help{font-size:12px;color:var(--muted);line-height:1.5;margin:6px 0 0}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--amber);color:#1a1206;border:none;border-radius:11px;padding:13px;
    font-family:"Bricolage Grotesque",Inter;font-weight:600;font-size:15px;cursor:pointer;margin-top:16px}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn:active{filter:brightness(.95)}
  .stationrow{display:grid;grid-template-columns:1fr 1fr 1.4fr 1fr auto;gap:6px;margin-bottom:6px}
  .stationrow input{padding:8px;font-size:13px}
  .stationrow button{background:transparent;border:1px solid var(--line);color:var(--bad);border-radius:8px;cursor:pointer;font-size:16px}
  .addrow{font-size:13px;color:var(--amber);background:none;border:none;cursor:pointer;padding:4px 0;margin-top:2px}
  .svclist{display:flex;flex-direction:column;gap:8px;margin:12px 0 18px}
  .svc{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--panel);border:1px solid var(--line);border-radius:11px;font-size:15px;cursor:pointer;user-select:none}
  .svc input{accent-color:var(--amber);width:19px;height:19px;flex:none}
  .search{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:12px 14px;font-family:Inter;font-size:15px;margin-bottom:12px}
  .showrow{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer}
  .showrow .grow{flex:1;min-width:0}
  .showrow .nm{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .showrow .meta2{font-size:12px;color:var(--muted);margin-top:3px}
  .star{flex:none;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:transparent;
    color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
  .star.on{color:var(--amber);border-color:var(--amber-dim)}
  .sheet{position:fixed;inset:0;z-index:40;background:rgba(8,10,14,.66);display:flex;align-items:flex-end;
    backdrop-filter:blur(2px)}
  .sheet-card{background:var(--ink);border-top:1px solid var(--line);border-radius:18px 18px 0 0;
    width:100%;max-width:680px;margin:0 auto;max-height:86vh;overflow:auto;padding:16px 16px calc(20px + env(safe-area-inset-bottom))}
  .sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .sheet-head h2{font-size:20px;font-weight:800}
  #sheetClose{background:none;border:none;color:var(--muted);font-size:28px;line-height:1;cursor:pointer;flex:none}
  .airing{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
  .airing:last-child{border-bottom:none}
  .airing .w{font-family:"IBM Plex Mono",monospace;color:var(--text);flex:1}
  .airing .ch{color:var(--amber)}

  .empty{text-align:center;color:var(--muted);padding:48px 16px;line-height:1.6}
  .empty .big{font-size:15px;color:var(--text);margin-bottom:6px}
  .stale{background:rgba(224,107,94,.12);border:1px solid var(--bad);color:#f0b3ab;
    font-size:12px;border-radius:10px;padding:9px 12px;margin-bottom:12px}

  nav{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;
    background:var(--panel);border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px 12px;
    font-family:Inter;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
  nav button.active{color:var(--amber)}
  nav svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;z-index:30;
    background:var(--panel2);border:1px solid var(--line);color:var(--text);
    padding:11px 16px;border-radius:11px;font-size:13px;max-width:90%;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="titlebar">
    <div>
      <div class="brand"><span class="dot"></span><h1 id="viewTitle">On Now</h1></div>
      <div class="sub" id="viewSub">Live across your services</div>
    </div>
    <label class="toggle" id="newToggleWrap" hidden>
      <input type="checkbox" id="newOnly"> New first
    </label>
  </div>
</header>

<main>
  <div id="staleBanner" class="stale" hidden></div>
  <section id="view-now" class="view active"></section>
  <section id="view-browse" class="view"></section>
  <section id="view-favorites" class="view"></section>
  <section id="view-setup" class="view"></section>
</main>

<div id="sheet" class="sheet" hidden>
  <div class="sheet-card">
    <div class="sheet-head">
      <div><h2 id="sheetTitle"></h2><div class="sub" id="sheetSub"></div></div>
      <button id="sheetClose" aria-label="Close">×</button>
    </div>
    <button class="btn" id="sheetFav"></button>
    <div id="sheetBody"></div>
  </div>
</div>

<nav>
  <button data-view="now" class="active" aria-label="On now">
    <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M8 21h8"/></svg>On Now</button>
  <button data-view="browse" aria-label="Browse shows">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Browse</button>
  <button data-view="favorites" aria-label="Favorites">
    <svg viewBox="0 0 24 24"><path d="M12 3l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 16.9 6.8 19.2l1-5.8L3.5 9.2l5.9-.9z"/></svg>Favorites</button>
  <button data-view="setup" aria-label="Setup">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Setup</button>
</nav>

<div id="toast" class="toast"></div>

<script>
// ---- tvguide app 2026-06-21 ----------------------------------------------
// EDIT THESE TWO before deploying (the repo that hosts your guide):
const REPO_OWNER = "jburns3cfi-dotcom";
const REPO_NAME  = "on-now";
// Generated for you; matches the VAPID secret in GitHub:
const VAPID_PUBLIC_KEY = "BEpGEakDlmL6dVxQ7GAFYi-4aKxFLTEjX7Pl2lWJ9Jo6naaiMKbRP2bNmD2YucozMtFooYv8r0EO9ns5PUL9e4E";

const S = x => (x===undefined||x===null) ? "" : (""+x);
const norm = x => S(x).toLowerCase().replace(/[^0-9a-z\u00c0-\uffff ]+/g," ").replace(/\s+/g," ").trim();
const $ = id => document.getElementById(id);
const TZ = -new Date().getTimezoneOffset(); // minutes east of UTC, used only server-side note

let SCHEDULE = [], CONFIG = {channels:[],days:14}, WATCH = [], META = null;

// ---- per-user preferences (stored on THIS device only) --------------------
function selectedServices(){try{const a=JSON.parse(localStorage.getItem("tv_services")||"null");return Array.isArray(a)?a:null;}catch(e){return null;}}
function setSelectedServices(arr){try{localStorage.setItem("tv_services",JSON.stringify(arr));}catch(e){}}
function recServices(r){return Array.isArray(r.services)?r.services:(r.service?[r.service]:[]);}
function serviceUniverse(){const seen=[],s=new Set();for(const r of SCHEDULE){for(const n of recServices(r)){const k=S(n).toLowerCase();if(n&&!s.has(k)){s.add(k);seen.push(S(n));}}}return seen.sort((a,b)=>a.localeCompare(b));}
function visible(){const sel=selectedServices();if(!sel||!sel.length)return SCHEDULE;const s=new Set(sel.map(x=>S(x).toLowerCase()));return SCHEDULE.filter(r=>recServices(r).some(n=>s.has(S(n).toLowerCase())));}
async function pushSubscription(){try{const reg=await navigator.serviceWorker.getRegistration();return reg?await reg.pushManager.getSubscription():null;}catch(e){return null;}}

function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}

function fmtWhen(iso){
  const d = new Date(iso); if(isNaN(d)) return "";
  const opt={weekday:"short",hour:"numeric",minute:"2-digit"};
  return d.toLocaleString([],opt);
}
function parse(rec){const s=new Date(rec.start),e=new Date(rec.end);
  return {...rec,_s:isNaN(s)?null:s,_e:isNaN(e)?null:e};}

async function loadAll(){
  const get = async (f)=>{try{const r=await fetch(f+"?t="+Date.now());if(!r.ok)return null;return await r.json();}catch(e){return null;}};
  const [sch,cfg,wl,meta] = await Promise.all([get("schedule.json"),get("config.json"),get("watchlist.json"),get("meta.json")]);
  SCHEDULE = Array.isArray(sch)?sch.map(parse).filter(r=>r._s):[];
  CONFIG = (cfg&&typeof cfg==="object")?cfg:{channels:[],days:14};
  if(!Array.isArray(CONFIG.channels)) CONFIG.channels=[];
  WATCH = Array.isArray(wl)?wl:(wl&&Array.isArray(wl.titles)?wl.titles:[]);
  // local-first watchlist edits override the published copy
  try{const local=JSON.parse(localStorage.getItem("tv_watch")||"null");if(Array.isArray(local))WATCH=local;}catch(e){}
  META = meta;
  checkStale();
}
function checkStale(){
  const b=$("staleBanner");
  if(!META||!META.updated){b.hidden=true;return;}
  const age=(Date.now()-new Date(META.updated))/36e5;
  if(age>30){b.hidden=false;b.textContent="Guide data is "+Math.round(age/24*10)/10+" days old — the nightly update may not be running.";}
  else b.hidden=true;
}

// ---- view: On Now ---------------------------------------------------------
function nowAndNext(now){
  const by={};
  for(const r of visible()){const k=r.channel_name||r.channel_number;(by[k]=by[k]||[]).push(r);}
  const out=[];
  for(const k in by){
    const recs=by[k].slice().sort((a,b)=>a._s-b._s);
    let cur=null,nxt=null;
    for(const r of recs){
      if(r._s<=now && r._e && now<r._e) cur=r;
      else if(r._s>now && !nxt) nxt=r;
    }
    if(cur||nxt) out.push({k,num:S((cur||nxt).channel_number),cur,nxt});
  }
  return out.sort((a,b)=>S(a.k).localeCompare(S(b.k)));
}
function renderNow(){
  const now=new Date(), rows=nowAndNext(now), el=$("view-now");
  if(!rows.length){el.innerHTML=emptyBlock("Nothing to show","Pick your services in Setup, or the guide hasn't loaded yet.");return;}
  if($("newOnly").checked) rows.sort((a,b)=>(b.cur&&b.cur.is_new?1:0)-(a.cur&&a.cur.is_new?1:0));
  el.innerHTML=rows.map(row=>{
    const c=row.cur;
    let prog=0;
    if(c&&c._s&&c._e){const t=(now-c._s)/(c._e-c._s);prog=Math.max(0,Math.min(1,t))*100;}
    const onNow = c ? `
      <div class="meta"><span class="onair"><span style="width:6px;height:6px;border-radius:50%;background:#1a1206;display:inline-block"></span>On air</span>
        ${c.is_new?'<span class="new">New</span>':''}
        <span class="mono">${fmtWhen(c.start)}</span></div>
      <div class="show">${esc(c.title)||"Programming"}</div>
      ${c.episode?`<div class="ep">${esc(c.episode)}</div>`:''}
      <div class="progress"><i style="width:${prog}%"></i></div>`
      : `<div class="label">Up next</div>`;
    const upNext = row.nxt ? `<div class="next">Next: <b>${esc(row.nxt.title)||"Programming"}</b> · <span class="mono">${fmtWhen(row.nxt.start)}</span>${row.nxt.is_new?' · <span style="color:var(--cyan)">New</span>':''}</div>` : "";
    return `<div class="card"><div class="rail"><div class="chnum">${esc(row.num)||"–"}</div><div class="chname">${esc(row.k)}</div></div>
      <div class="body">${onNow}${upNext}</div></div>`;
  }).join("");
}

// ---- show index + lookups -------------------------------------------------
function showIndex(){
  const now=new Date(), map={};
  for(const r of visible()){
    if(!r._s||r._s<now) continue;
    const k=norm(r.title); if(!k) continue;
    const m=map[k]||(map[k]={title:r.title,key:k,next:null,nextNew:null});
    if(!m.next||r._s<m.next._s) m.next=r;
    if(r.is_new&&(!m.nextNew||r._s<m.nextNew._s)) m.nextNew=r;
  }
  return Object.values(map).sort((a,b)=>S(a.title).localeCompare(S(b.title)));
}
function nextForTitle(title,newOnly){
  const want=norm(title), now=new Date(); let best=null;
  for(const r of visible()){
    if(!r._s||r._s<now) continue;
    if(newOnly&&!r.is_new) continue;
    if(norm(r.title)!==want) continue;
    if(!best||r._s<best._s) best=r;
  }
  return best;
}
function airingsForTitle(title){
  const want=norm(title), now=new Date(), out=[];
  for(const r of visible()){ if(r._s&&r._s>=now&&norm(r.title)===want) out.push(r); }
  return out.sort((a,b)=>a._s-b._s);
}
function isFav(t){return WATCH.some(x=>norm(x)===norm(t));}
function toggleFav(t){ if(isFav(t)) delWatch(t); else addWatch(t); }

// ---- view: Browse / search ------------------------------------------------
function renderBrowse(){
  const el=$("view-browse");
  const q=S(el._q||"").trim();
  const shows=showIndex().filter(s=>!q||norm(s.title).includes(norm(q)));
  const rows=shows.slice(0,400).map(s=>{
    const on=isFav(s.title)?"on":"";
    const when=s.nextNew?`New ep ${fmtWhen(s.nextNew.start)} · ${esc(s.nextNew.channel_name)}`
              :(s.next?`Next ${fmtWhen(s.next.start)} · ${esc(s.next.channel_name)}`:"");
    return `<div class="showrow" data-show="${escAttr(s.title)}">
      <div class="grow"><div class="nm">${esc(s.title)||"Programming"}</div><div class="meta2">${when}</div></div>
      <button class="star ${on}" data-fav="${escAttr(s.title)}" aria-label="Favorite">${on?"★":"☆"}</button></div>`;
  }).join("");
  el.innerHTML=`<input class="search" id="browseQ" placeholder="Search shows…" value="${escAttr(q)}">
    ${shows.length?rows:emptyBlock(q?"No matches":"No shows yet","Pick your services in Setup, or the guide hasn't loaded.")}`;
  const inp=$("browseQ");
  inp.oninput=()=>{el._q=inp.value;const p=inp.selectionStart;renderBrowse();const n=$("browseQ");if(n){n.focus();try{n.setSelectionRange(p,p);}catch(e){}}};
  el.querySelectorAll("[data-fav]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();toggleFav(b.getAttribute("data-fav"));renderBrowse();});
  el.querySelectorAll("[data-show]").forEach(b=>b.onclick=()=>openShow(b.getAttribute("data-show")));
}

// ---- view: Favorites ------------------------------------------------------
function renderFavorites(){
  const el=$("view-favorites");
  const list=WATCH.map(t=>{
    const nn=nextForTitle(t,true), nx=nextForTitle(t,false);
    const primary=nn?`<div class="when">New ep: <span class="mono">${fmtWhen(nn.start)}</span> · <span class="where">${esc(nn.channel_name)}</span></div>`
                    :`<div class="when muted">No new episode scheduled yet</div>`;
    const fallback=(nx&&(!nn||nx.program_id!==nn.program_id))?`<div class="when muted">Next on: <span class="mono">${fmtWhen(nx.start)}</span> · ${esc(nx.channel_name)}</div>`:"";
    return `<div class="row"><div class="top"><div class="show" data-show="${escAttr(t)}" style="cursor:pointer">${esc(t)}</div>
       <button class="chip-btn" style="border-color:var(--line);color:var(--bad)" data-del="${escAttr(t)}">Remove</button></div>
       ${primary}${fallback}</div>`;
  }).join("");
  el.innerHTML=`
    <div class="row" style="display:flex;gap:8px;align-items:center">
      <input type="text" id="addShow" placeholder="Add a show by name…" style="flex:1">
      <button class="chip-btn" id="addShowBtn">Add</button>
    </div>
    ${WATCH.length?list:emptyBlock("No favorites yet","Add a show by name above, or find shows on the Browse tab.")}
    ${WATCH.length?'<button class="btn" id="saveShows">Save my shows &amp; alerts</button>':''}
    <p class="help">Saved on this device. Tap save to get alerts for your shows (files a quick GitHub issue — press Create). Alerts come only to this device.</p>`;
  $("addShowBtn").onclick=()=>{const v=$("addShow").value;if(v.trim()){addWatch(v);$("addShow").value="";renderFavorites();}};
  $("addShow").addEventListener("keydown",e=>{if(e.key==="Enter"){$("addShowBtn").click();}});
  el.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{delWatch(b.getAttribute("data-del"));renderFavorites();});
  el.querySelectorAll("[data-show]").forEach(b=>b.onclick=()=>openShow(b.getAttribute("data-show")));
  const ss=$("saveShows"); if(ss) ss.onclick=()=>registerDevice("Update my shows");
}

// ---- show detail sheet ----------------------------------------------------
function openShow(title){
  const airings=airingsForTitle(title);
  $("sheetTitle").textContent=S(title);
  const newCount=airings.filter(a=>a.is_new).length;
  $("sheetSub").textContent=airings.length?(newCount?`${newCount} new episode${newCount>1?"s":""} ahead`:"Reruns only in the next two weeks"):"Nothing scheduled in the next two weeks";
  const fav=isFav(title), fb=$("sheetFav");
  fb.textContent=fav?"★ Remove from favorites":"☆ Add to favorites";
  fb.className=fav?"btn ghost":"btn";
  fb.onclick=()=>{toggleFav(title);openShow(title);renderFavorites();renderBrowse();};
  $("sheetBody").innerHTML=airings.length?airings.slice(0,60).map(a=>`
     <div class="airing"><span class="w">${fmtWhen(a.start)}</span>
       ${a.is_new?'<span class="new">New</span>':'<span style="color:var(--muted);font-size:11px">Rerun</span>'}
       <span class="ch">${esc(a.channel_name)}</span></div>`).join("")
    :`<p class="help">This show isn't in the next two weeks of the guide. Keep it in favorites and it'll show here — with an alert — when it returns.</p>`;
  $("sheet").hidden=false;
}
function closeSheet(){$("sheet").hidden=true;}

function persistWatch(){try{localStorage.setItem("tv_watch",JSON.stringify(WATCH));}catch(e){}}
function addWatch(t){t=S(t).trim();if(!t)return;if(WATCH.some(x=>norm(x)===norm(t))){toast("Already in favorites");return;}
  WATCH.push(t);persistWatch();toast("Added to favorites");}
function delWatch(t){WATCH=WATCH.filter(x=>norm(x)!==norm(t));persistWatch();}

// ---- view: Setup (per-user: pick your services + notifications) -----------
function renderSetup(){
  const el=$("view-setup");
  const all=serviceUniverse();
  const sel=selectedServices();
  const chosen=new Set((sel&&sel.length?sel:all).map(x=>S(x).toLowerCase()));
  const toggles = all.length ? all.map(name=>{
    const on=chosen.has(S(name).toLowerCase());
    return `<label class="svc"><input type="checkbox" data-svc="${escAttr(name)}" ${on?"checked":""}> ${esc(name)}</label>`;
  }).join("") : `<p class="help">No services in the guide yet — once it's built they'll appear here.</p>`;
  el.innerHTML=`
    <h3 style="font-size:16px;margin-bottom:6px">Your services</h3>
    <p class="help">Tick the services you have. The guide will show just those channels — only on this device.</p>
    <div class="svclist">${toggles}</div>
    <button class="btn ghost" id="enableNotif">Turn on notifications on this device</button>
    <p class="help" id="notifState"></p>`;
  el.querySelectorAll("[data-svc]").forEach(cb=>cb.onchange=()=>{
    const picked=[...el.querySelectorAll("[data-svc]")].filter(x=>x.checked).map(x=>x.getAttribute("data-svc"));
    setSelectedServices(picked);
    if(picked.length) toast("Showing your services"); else toast("Showing all channels");
    pushSubscription().then(s=>{ if(s) registerDevice("Update my services", true); });
  });
  $("enableNotif").onclick=enableNotifications;
  showNotifState();
}

// ---- notifications --------------------------------------------------------
function urlB64ToUint8(base64){const pad="=".repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,"+").replace(/_/g,"/");const raw=atob(b);
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
async function enableNotifications(){
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)){toast("This device can't do web push");return;}
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){toast("Notifications were not allowed");return;}
    const reg=await navigator.serviceWorker.ready;
    await reg.pushManager.subscribe({userVisibleOnly:true,
      applicationServerKey:urlB64ToUint8(VAPID_PUBLIC_KEY)});
    registerDevice("Turn on my alerts");
    showNotifState(true);
  }catch(e){toast("Could not enable notifications");}
}
async function registerDevice(title, silent){
  const sub=await pushSubscription();
  if(!sub){ if(!silent) toast("Turn on notifications first"); return; }
  const services=selectedServices()||serviceUniverse();
  const payload={subscription:JSON.parse(JSON.stringify(sub)),watchlist:WATCH,services:services,tz:TZ};
  fileIssue("register",payload,title||"Update my alerts");
}
async function showNotifState(justEnabled){
  const el=$("notifState"); if(!el) return;
  let on=false;
  try{const reg=await navigator.serviceWorker.getRegistration();const s=reg&&await reg.pushManager.getSubscription();on=!!s;}catch(e){}
  el.textContent = (on||justEnabled) ? "Notifications on for this device. Each device enables its own."
    : "Notifications are off on this device.";
}

// ---- write path: prefilled GitHub issue -----------------------------------
function b64uJSON(obj){const json=JSON.stringify(obj);
  const bytes=new TextEncoder().encode(json);let bin="";bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
function fileIssue(type,data,title){
  if(REPO_OWNER==="REPLACE_OWNER"){toast("Set REPO_OWNER / REPO_NAME first");return;}
  const payload={type,data};
  const body="Submitted from the TV guide app — just press **Create**.\n\n```\nTVGUIDE_PAYLOAD:"+b64uJSON(payload)+"\n```";
  const url=`https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?title=${encodeURIComponent("[tvguide] "+title)}&body=${encodeURIComponent(body)}`;
  window.open(url,"_blank","noopener");
  toast("Opening GitHub — press Create to save");
}

// ---- helpers + routing ----------------------------------------------------
function esc(s){return S(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escAttr(s){return esc(s).replace(/"/g,"&quot;");}
function emptyBlock(big,small){return `<div class="empty"><div class="big">${esc(big)}</div>${esc(small)}</div>`;}

const TITLES={now:["On Now","What's playing across your networks"],browse:["Browse","Find any show on your networks"],
  favorites:["Favorites","Your shows & their next new episode"],setup:["Setup","Your services & alerts"]};
let CURRENT="now";
function render(){
  if(CURRENT==="now")renderNow();
  else if(CURRENT==="browse")renderBrowse();
  else if(CURRENT==="favorites")renderFavorites();
  else if(CURRENT==="setup")renderSetup();
}
function go(view){
  CURRENT=view;
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("view-"+view).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  $("viewTitle").textContent=TITLES[view][0];$("viewSub").textContent=TITLES[view][1];
  $("newToggleWrap").hidden = view!=="now";
  render();
}
$("sheetClose").onclick=closeSheet;
$("sheet").onclick=(e)=>{if(e.target===$("sheet"))closeSheet();};
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>go(b.dataset.view));
$("newOnly").onchange=()=>renderNow();

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
loadAll().then(()=>{render();});
setInterval(()=>{ if(CURRENT==="now") renderNow(); }, 60000); // keep "now" live
</script>
