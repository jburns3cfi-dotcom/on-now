name: onnow

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "notify-digest | notify-soon"
        default: "notify-digest"
        required: true
  issues:
    types: [opened]

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: onnow
  cancel-in-progress: false

jobs:
  ingest:
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, '[tvguide]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Apply submission
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python "tvguide_ingest_2026-06-21.py"
      - name: Commit
        run: |
          git config user.name "onnow-bot"
          git config user.email "onnow-bot@users.noreply.github.com"
          git add public/config.json public/subscribers.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "onnow: submission #${{ github.event.issue.number }}"
            git push
          fi
      - name: Close issue
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: gh issue close "${{ github.event.issue.number }}" -c "Saved." -R "${{ github.repository }}"

  notify:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pywebpush
      - name: Decide mode
        id: mode
        run: |
          case "${{ github.event.schedule }}" in
            "0 12 * * *")   echo "mode=notify-digest" >> "$GITHUB_OUTPUT" ;;
            "*/15 * * * *") echo "mode=notify-soon" >> "$GITHUB_OUTPUT" ;;
            *)              echo "mode=${{ github.event.inputs.mode || 'notify-digest' }}" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Send ${{ steps.mode.outputs.mode }}
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          TZ_OFFSET_MIN: ${{ vars.TZ_OFFSET_MIN }}
        run: python "tvguide_job_2026-06-21.py" "${{ steps.mode.outputs.mode }}"
      - name: Commit pruned subscribers
        run: |
          git config user.name "onnow-bot"
          git config user.email "onnow-bot@users.noreply.github.com"
          git add public/subscribers.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "onnow: prune subscribers"
            git push
          fi

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          rm -rf _site && mkdir _site
          cp index.html sw.js manifest.webmanifest icon-192.png icon-512.png _site/ 2>/dev/null || true
          cp public/*.json _site/ 2>/dev/null || true
          rm -f _site/subscribers.json _site/*.tmp
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deploy
        uses: actions/deploy-pages@v4
